# Shopify App Configuration — CLI v3 Format
# Docs: https://shopify.dev/docs/apps/tools/cli/configuration

name = "Forefront Chatbot"
client_id = "97358d745c4a59a53d02a23c45d7bbdf"
application_url = "https://0373-1-39-77-242.ngrok-free.app"
embedded = false

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_customers,write_customers,read_script_tags,write_script_tags,read_inventory,read_fulfillments,write_fulfillments,read_checkouts,read_shipping,write_draft_orders"

[auth]
redirect_urls = [
  "https://0373-1-39-77-242.ngrok-free.app/api/shopify/callback"
]

[webhooks]
api_version = "2024-01"

  [webhooks.privacy_compliance]
  customer_data_request_url = "https://0373-1-39-77-242.ngrok-free.app/api/shopify/gdpr/customers/data_request"
  customer_deletion_url = "https://0373-1-39-77-242.ngrok-free.app/api/shopify/gdpr/customers/redact"
  shop_deletion_url = "https://0373-1-39-77-242.ngrok-free.app/api/shopify/gdpr/shop/redact"

  [[webhooks.subscriptions]]
  topics = [
    "orders/create",
    "orders/updated",
    "orders/cancelled",
    "orders/paid",
    "orders/fulfilled",
    "customers/create",
    "customers/update",
    "checkouts/create",
    "checkouts/update",
    "refunds/create",
    "fulfillments/create",
    "app/uninstalled",
    "products/update"
  ]
  uri = "https://0373-1-39-77-242.ngrok-free.app/api/shopify/webhooks"
